name: Release npm package

on:
  push:
    branches:
      - master
permissions:
  id-token: write # Required for OIDC
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      - run: npm run semantic-release -- --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
